name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn clean package -f ValorantPlugin/pom.xml
      - uses: actions/upload-artifact@v3
        with:
          name: ValorantMC-JAR
          path: ValorantPlugin/target/ValorantMC-1.0.0.jar
